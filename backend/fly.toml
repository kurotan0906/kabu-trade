# backend/fly.toml
# Replace <YOUR_APP_NAME> below with your unique Fly.io app name (e.g. kabu-trade-backend-yourname)
app = "<YOUR_APP_NAME>"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
